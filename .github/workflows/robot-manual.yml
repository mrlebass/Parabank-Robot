name: Robot - Manual (Select Suites)

run-name: >-
  Robot Manual | mode=${{ inputs.mode }} |
  include=${{ inputs.tag_filter }} |
  branch=${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        type: choice
        required: true
        default: parallel
        options:
          - parallel
          - single

      run_login:
        description: "Run Login ✔️"
        type: boolean
        required: false
        default: false

      run_transfer:
        description: "Run Transfer ✔️"
        type: boolean
        required: false
        default: false

      run_billpay:
        description: "Run BillPay ✔️"
        type: boolean
        required: false
        default: false

      run_opennewaccount:
        description: "Run OpenNewAccount ✔️"
        type: boolean
        required: false
        default: false

      run_updateprofile:
        description: "Run UpdateProfile ✔️"
        type: boolean
        required: false
        default: false

      tag_filter:
        description: "Include tag filter"
        type: choice
        required: true
        default: all
        options:
          - all
          - positive
          - negative
          - smoke
          - regression
          - custom

      custom_tags:
        description: "If tag_filter=custom, provide tags separated by comma (ex: Positive,Smoke)"
        required: false
        default: ""

      exclude_tags:
        description: "Tags to exclude, separated by comma (optional)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-manual"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  RESULTS_DIR: "Results"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.out.outputs.mode }}
      matrix: ${{ steps.out.outputs.matrix }}
      single_paths: ${{ steps.out.outputs.single_paths }}
      include_args: ${{ steps.out.outputs.include_args }}
      exclude_args: ${{ steps.out.outputs.exclude_args }}
      robot_args: ${{ steps.out.outputs.robot_args }}
      has_suites: ${{ steps.out.outputs.has_suites }}
      selected_slugs: ${{ steps.out.outputs.selected_slugs }}
      selected_count: ${{ steps.out.outputs.selected_count }}

    steps:
      - name: Build suite selection and tag filters
        id: out
        shell: bash
        run: |
          set -euo pipefail

          MODE="${{ github.event.inputs.mode }}"
          TAG_FILTER="${{ github.event.inputs.tag_filter }}"
          CUSTOM_TAGS="${{ github.event.inputs.custom_tags }}"
          EXCLUDE_TAGS="${{ github.event.inputs.exclude_tags }}"

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

          INCLUDE_ARGS=""
          case "$TAG_FILTER" in
            all)
              INCLUDE_ARGS=""
              ;;
            positive)
              INCLUDE_ARGS="--include Positive"
              ;;
            negative)
              INCLUDE_ARGS="--include Negative"
              ;;
            smoke)
              INCLUDE_ARGS="--include Smoke"
              ;;
            regression)
              INCLUDE_ARGS="--include Regression"
              ;;
            custom)
              IFS=',' read -ra arr <<< "$CUSTOM_TAGS"
              for t in "${arr[@]}"; do
                tt="$(echo "$t" | xargs)"
                [ -n "$tt" ] && INCLUDE_ARGS="$INCLUDE_ARGS --include $tt"
              done
              INCLUDE_ARGS="$(echo "$INCLUDE_ARGS" | xargs)"
              ;;
          esac

          EXCLUDE_ARGS=""
          IFS=',' read -ra ex_arr <<< "$EXCLUDE_TAGS"
          for t in "${ex_arr[@]}"; do
            tt="$(echo "$t" | xargs)"
            [ -n "$tt" ] && EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude $tt"
          done
          EXCLUDE_ARGS="$(echo "$EXCLUDE_ARGS" | xargs)"

          ROBOT_ARGS="$(echo "$INCLUDE_ARGS $EXCLUDE_ARGS" | xargs)"

          echo "include_args=$INCLUDE_ARGS" >> "$GITHUB_OUTPUT"
          echo "exclude_args=$EXCLUDE_ARGS" >> "$GITHUB_OUTPUT"
          echo "robot_args=$ROBOT_ARGS" >> "$GITHUB_OUTPUT"

          suites=()
          paths=()
          slugs=()

          if [ "${{ github.event.inputs.run_login }}" = "true" ]; then
            suites+=('{"path":"Resources/Login","slug":"Resources-Login"}')
            paths+=("Resources/Login")
            slugs+=("Resources-Login")
          fi

          if [ "${{ github.event.inputs.run_transfer }}" = "true" ]; then
            suites+=('{"path":"Resources/Transfer","slug":"Resources-Transfer"}')
            paths+=("Resources/Transfer")
            slugs+=("Resources-Transfer")
          fi

          if [ "${{ github.event.inputs.run_billpay }}" = "true" ]; then
            suites+=('{"path":"Resources/BillPay","slug":"Resources-BillPay"}')
            paths+=("Resources/BillPay")
            slugs+=("Resources-BillPay")
          fi

          if [ "${{ github.event.inputs.run_opennewaccount }}" = "true" ]; then
            suites+=('{"path":"Resources/OpenNewAccount","slug":"Resources-OpenNewAccount"}')
            paths+=("Resources/OpenNewAccount")
            slugs+=("Resources-OpenNewAccount")
          fi

          if [ "${{ github.event.inputs.run_updateprofile }}" = "true" ]; then
            suites+=('{"path":"Resources/UpdateProfile","slug":"Resources-UpdateProfile"}')
            paths+=("Resources/UpdateProfile")
            slugs+=("Resources-UpdateProfile")
          fi

          if [ "${#suites[@]}" -eq 0 ]; then
            echo "has_suites=false" >> "$GITHUB_OUTPUT"
            echo "selected_count=0" >> "$GITHUB_OUTPUT"
            echo "selected_slugs=" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "single_paths=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_suites=true" >> "$GITHUB_OUTPUT"
          echo "selected_count=${#suites[@]}" >> "$GITHUB_OUTPUT"

          MATRIX_JSON="[$(IFS=,; echo "${suites[*]}")]"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

          SINGLE_PATHS="$(printf "%s " "${paths[@]}" | xargs)"
          echo "single_paths=$SINGLE_PATHS" >> "$GITHUB_OUTPUT"

          SELECTED_SLUGS="$(IFS=,; echo "${slugs[*]}")"
          echo "selected_slugs=$SELECTED_SLUGS" >> "$GITHUB_OUTPUT"

      - name: Debug selection
        shell: bash
        run: |
          echo "Mode.............: ${{ steps.out.outputs.mode }}"
          echo "Has suites.......: ${{ steps.out.outputs.has_suites }}"
          echo "Selected count...: ${{ steps.out.outputs.selected_count }}"
          echo "Selected slugs...: ${{ steps.out.outputs.selected_slugs }}"
          echo "Matrix...........: ${{ steps.out.outputs.matrix }}"
          echo "Single paths.....: ${{ steps.out.outputs.single_paths }}"
          echo "Include args.....: ${{ steps.out.outputs.include_args }}"
          echo "Exclude args.....: ${{ steps.out.outputs.exclude_args }}"
          echo "Robot args.......: ${{ steps.out.outputs.robot_args }}"

      - name: Fail when no feature is selected
        if: ${{ steps.out.outputs.has_suites != 'true' }}
        shell: bash
        run: |
          echo "::error::Nenhuma feature foi selecionada. Marque ao menos uma suíte para execução."
          exit 1

  robot-parallel:
    needs: prepare
    if: ${{ needs.prepare.outputs.mode == 'parallel' && needs.prepare.outputs.has_suites == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome & system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb libgl1-mesa-glx
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-linux-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Debug current suite
        run: |
          echo "Running suite path: ${{ matrix.suite.path }}"
          echo "Running suite slug: ${{ matrix.suite.slug }}"
          echo "Robot args........: ${{ needs.prepare.outputs.robot_args }}"

      - name: Validate suite path
        shell: bash
        run: |
          test -d "${{ matrix.suite.path }}" || { echo "::error::Suite path not found: ${{ matrix.suite.path }}"; exit 1; }

      - name: Run Robot (headless - parallel)
        shell: bash
        run: |
          set +e
          OUT="${{ env.RESULTS_DIR }}/${{ matrix.suite.slug }}"
          mkdir -p "$OUT"

          xvfb-run robot -d "$OUT" -v HEADLESS:True ${{ needs.prepare.outputs.robot_args }} "${{ matrix.suite.path }}"

          echo $? > "$OUT/robot.exitcode"
          set -e

      - name: Upload artifacts (per suite)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ matrix.suite.slug }}
          path: ${{ env.RESULTS_DIR }}/${{ matrix.suite.slug }}/**
          retention-days: 14

  robot-single:
    needs: prepare
    if: ${{ needs.prepare.outputs.mode == 'single' && needs.prepare.outputs.has_suites == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome & system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb libgl1-mesa-glx
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-linux-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Debug selected suites
        run: |
          echo "Mode.............: ${{ needs.prepare.outputs.mode }}"
          echo "Selected count...: ${{ needs.prepare.outputs.selected_count }}"
          echo "Selected slugs...: ${{ needs.prepare.outputs.selected_slugs }}"
          echo "Single paths.....: ${{ needs.prepare.outputs.single_paths }}"
          echo "Robot args.......: ${{ needs.prepare.outputs.robot_args }}"

      - name: Validate selected suite paths
        shell: bash
        run: |
          read -r -a SUITE_PATHS <<< "${{ needs.prepare.outputs.single_paths }}"
          for p in "${SUITE_PATHS[@]}"; do
            test -d "$p" || { echo "::error::Suite path not found: $p"; exit 1; }
          done

      - name: Run Robot (headless - single job, selected suites only)
        shell: bash
        run: |
          set +e
          OUT="${{ env.RESULTS_DIR }}/Resources-Selected"
          mkdir -p "$OUT"

          read -r -a SUITE_PATHS <<< "${{ needs.prepare.outputs.single_paths }}"

          echo "Selected suites:"
          printf ' - %s\n' "${SUITE_PATHS[@]}"

          xvfb-run robot -d "$OUT" -v HEADLESS:True ${{ needs.prepare.outputs.robot_args }} "${SUITE_PATHS[@]}"

          echo $? > "$OUT/robot.exitcode"
          set -e

      - name: Upload artifacts (single job)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-Resources-Selected
          path: ${{ env.RESULTS_DIR }}/Resources-Selected/**
          retention-days: 14

  build-pages:
    if: always()
    needs: [robot-parallel, robot-single]
    runs-on: ubuntu-latest
    outputs:
      site_ready: ${{ steps.validate.outputs.site_ready }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Show downloaded artifacts
        shell: bash
        run: |
          echo "Artifacts directory structure:"
          find _artifacts -maxdepth 4 -type f | sort || true

      - name: Build Pages site (latest + runs/<run_id>)
        shell: bash
        run: |
          set -e
          RUN="${{ github.run_id }}"
          mkdir -p site/latest site/runs/"$RUN"
          touch site/.nojekyll

          for d in _artifacts/*; do
            [ -d "$d" ] || continue
            bn="$(basename "$d")"
            slug="${bn#robot-results-}"
            mkdir -p "site/latest/$slug" "site/runs/$RUN/$slug"
            cp -R "$d/"* "site/latest/$slug/" 2>/dev/null || true
            cp -R "$d/"* "site/runs/$RUN/$slug/" 2>/dev/null || true
          done

          python - <<'PY'
          import os
          import pathlib

          site = pathlib.Path("site")
          run_id = os.getenv("GITHUB_RUN_ID", "")

          def suite_links(folder: pathlib.Path, prefix: str):
              items = []
              if folder.exists():
                  for p in sorted(folder.iterdir()):
                      if p.is_dir():
                          slug = p.name
                          items.append((slug, f"{prefix}/{slug}/log.html", f"{prefix}/{slug}/report.html"))
              return items

          base_style = (
              "<style>"
              "body{font-family:Arial,sans-serif;max-width:980px;margin:40px auto;padding:0 16px;line-height:1.5}"
              "h1,h2{color:#222}"
              "a{color:#0b57d0;text-decoration:none}"
              "a:hover{text-decoration:underline}"
              "ul{padding-left:20px}"
              "code{background:#f4f4f4;padding:2px 6px;border-radius:4px}"
              ".empty{padding:16px;background:#fafafa;border:1px solid #ddd;border-radius:8px;color:#555}"
              "</style>"
          )

          latest_items = suite_links(site / "latest", "./latest")
          runs_root = site / "runs"
          runs = sorted([p.name for p in runs_root.iterdir() if p.is_dir()], reverse=True) if runs_root.exists() else []

          root_html = [
              "<!doctype html><html><head><meta charset='utf-8'><title>Robot Reports</title>",
              base_style,
              "</head><body>",
              "<h1>Robot Framework Reports</h1>",
              "<p><b>Latest:</b> <a href='./latest/'>abrir</a></p>",
              f"<p><b>This run:</b> <a href='./runs/{run_id}/'>abrir</a></p>",
              "<p><b>Runs:</b> <a href='./runs/'>abrir histórico</a></p>",
              "</body></html>",
          ]
          (site / "index.html").write_text("\n".join(root_html), encoding="utf-8")

          html = [
              "<!doctype html><html><head><meta charset='utf-8'><title>Latest</title>",
              base_style,
              "</head><body>",
              "<h2>Latest</h2>",
          ]
          if latest_items:
              html.append("<ul>")
              for slug, log, rep in latest_items:
                  html.append(f"<li><b>{slug}</b> — <a href='{log}'>log</a> | <a href='{rep}'>report</a></li>")
              html.append("</ul>")
          else:
              html.append("<div class='empty'>Nenhum report encontrado em <code>latest/</code>.</div>")
          html.append("<p><a href='../'>voltar</a></p></body></html>")
          (site / "latest" / "index.html").write_text("\n".join(html), encoding="utf-8")

          html = [
              "<!doctype html><html><head><meta charset='utf-8'><title>Runs</title>",
              base_style,
              "</head><body>",
              "<h2>Runs</h2>",
          ]
          if runs:
              html.append("<ul>")
              for r in runs[:50]:
                  html.append(f"<li><a href='./{r}/'>{r}</a></li>")
              html.append("</ul>")
          else:
              html.append("<div class='empty'>Nenhuma execução histórica encontrada.</div>")
          html.append("<p><a href='../'>voltar</a></p></body></html>")
          (site / "runs" / "index.html").write_text("\n".join(html), encoding="utf-8")

          run_dir = site / "runs" / run_id
          run_dir.mkdir(parents=True, exist_ok=True)
          items = suite_links(run_dir, ".")
          html = [
              "<!doctype html><html><head><meta charset='utf-8'><title>This Run</title>",
              base_style,
              "</head><body>",
              f"<h2>Run {run_id}</h2>",
          ]
          if items:
              html.append("<ul>")
              for slug, log, rep in items:
                  html.append(f"<li><b>{slug}</b> — <a href='{log}'>log</a> | <a href='{rep}'>report</a></li>")
              html.append("</ul>")
          else:
              html.append("<div class='empty'>Nenhum report encontrado para esta execução.</div>")
          html.append("<p><a href='../'>voltar</a></p></body></html>")
          (run_dir / "index.html").write_text("\n".join(html), encoding="utf-8")
          PY

      - name: Validate generated site
        id: validate
        shell: bash
        run: |
          set -e
          test -f site/index.html || { echo "::error::site/index.html not found"; exit 1; }
          test -f site/latest/index.html || { echo "::error::site/latest/index.html not found"; exit 1; }
          test -f site/runs/index.html || { echo "::error::site/runs/index.html not found"; exit 1; }
          echo "Generated site structure:"
          find site -maxdepth 4 -type f | sort
          echo "site_ready=true" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy-pages:
    if: ${{ always() && needs.build-pages.outputs.site_ready == 'true' }}
    needs: [build-pages]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
